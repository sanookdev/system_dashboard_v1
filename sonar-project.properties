sonar.projectKey=Single-Portal
sonar.projectName=Single-Portal
sonar.projectVersion=1.0

# SonarQube Server
sonar.host.url=http://localhost:9000
sonar.token=sqp_5781542c498172852422659c789a278af4c8b3e8

# Source Directories
sonar.sources=Frontend,Backend
sonar.sourceEncoding=UTF-8

# Exclusions
# ไม่สแกนไฟล์ build, node_modules, coverage, test files
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.test.js,**/*.spec.js,**/__tests__/**

# Language-specific Settings
# รองรับไฟล์ .vue และ JavaScript ทั่วไป
sonar.javascript.file.suffixes=.js,.jsx,.vue

# ปิดการรายงาน Coverage
# (หากไม่ต้องการให้ SonarQube สนใจ coverage เลย อย่าใส่ path ของ lcov)
# sonar.javascript.lcov.reportPaths=Frontend/coverage/lcov.info

# หาก Backend ใช้ PHP (ถ้าไม่ใช้ PHP สามารถลบออกได้)
# sonar.php.file.suffixes=.php
# sonar.php.coverage.reportPaths=Backend/coverage.xml

# Dependency-Check
sonar.dependencyCheck.htmlReportPath=dependency-check-report.html
sonar.dependencyCheck.xmlReportPath=dependency-check-report.xml
